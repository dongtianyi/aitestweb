<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 渐变背景圆 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)"/>
  
  <!-- 蝴蝶左翅膀 -->
  <ellipse cx="75" cy="90" rx="25" ry="35" fill="url(#wingGrad)" opacity="0.9"/>
  <ellipse cx="75" cy="110" rx="20" ry="25" fill="url(#wingGrad)" opacity="0.8"/>
  
  <!-- 蝴蝶右翅膀 -->
  <ellipse cx="125" cy="90" rx="25" ry="35" fill="url(#wingGrad)" opacity="0.9"/>
  <ellipse cx="125" cy="110" rx="20" ry="25" fill="url(#wingGrad)" opacity="0.8"/>
  
  <!-- 蝴蝶身体 -->
  <ellipse cx="100" cy="100" rx="6" ry="25" fill="#fff"/>
  
  <!-- 触角 -->
  <path d="M95 80 Q90 70 85 75" stroke="#fff" stroke-width="2" fill="none"/>
  <path d="M105 80 Q110 70 115 75" stroke="#fff" stroke-width="2" fill="none"/>
  <circle cx="85" cy="75" r="2" fill="#fff"/>
  <circle cx="115" cy="75" r="2" fill="#fff"/>
  
  <!-- 十二文字 -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">TWELVE</text>
</svg>
